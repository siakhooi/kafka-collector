services:
  kafka:
    image: apache/kafka:3.7.0
    container_name: kafka
    ports:
      - "9092:9092"
    networks:
      - kafka-collector
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@localhost:9093
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - CLUSTER_ID=MkU3OEVBNTcwNTJENDM2Qk
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka-collector:
    image: siakhooi/kafka-collector:latest
    container_name: kafka-collector
    networks:
      - kafka-collector
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      - KAFKA_TOPICS=topic1,topic2
      - KAFKA_BOOTSTRAP_SERVER=kafka:9092
      - KAFKA_GROUP=my-consumer-group
      - COLLECTOR_MODE=service
      - COLLECTOR_SERVICE_PORT=8080
      - COLLECTOR_CAPTURE_DIR=/data/captures
    ports:
      - "8080:8080"
    volumes:
      - ./captures:/data/captures

networks:
  kafka-collector:
    external: true