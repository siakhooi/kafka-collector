apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka-collector
  labels:
    app: kafka-collector
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka-collector
  template:
    metadata:
      labels:
        app: kafka-collector
    spec:
      containers:
        - name: kafka-collector
          image: siakhooi/kafka-collector:latest
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: kafka-collector-config
          volumeMounts:
            - name: captures
              mountPath: /data/captures
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: captures
          emptyDir: {}
